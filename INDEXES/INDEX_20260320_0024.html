<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>POLITIIKKAPÖRSSI</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg-deep:     #03050f;
      --bg-panel:    #080d1f;
      --bg-card:     #0b1128;
      --border:      #1a2a55;
      --glow-cyan:   #00f5ff;
      --glow-pink:   #ff007a;
      --glow-green:  #39ff14;
      --text-primary:#e8f4ff;
      --text-muted:  #5a7a99;
      --accent:      #00d4ff;

      /* Puoluevärit */
      --kok:   #003580;
      --ps:    #ffd700;
      --sdp:   #cc0000;
      --kesk:  #007a3d;
      --vihr:  #39c639;
      --vas:   #c8001e;
      --rkp:   #ffd700;
      --kd:    #003c8f;
      --liik:  #6a0dad;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg-deep);
      color: var(--text-primary);
      font-family: 'Rajdhani', sans-serif;
      font-size: 16px;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Taustakuvio ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── HEADER ── */
    header {
      position: relative;
      text-align: center;
      padding: 3rem 1rem 2.5rem;
      border-bottom: 1px solid var(--border);
      overflow: hidden;
      z-index: 1;
    }

    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% -20%, rgba(0,212,255,.18), transparent 70%);
      pointer-events: none;
    }

    .header-eyebrow {
      font-family: 'Orbitron', monospace;
      font-size: .65rem;
      letter-spacing: .35em;
      color: var(--glow-cyan);
      text-transform: uppercase;
      margin-bottom: .75rem;
      opacity: .8;
    }

    h1 {
      font-family: 'Orbitron', monospace;
      font-size: clamp(2rem, 6vw, 4.5rem);
      font-weight: 900;
      letter-spacing: .12em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #fff 10%, var(--glow-cyan) 55%, var(--glow-pink) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 24px rgba(0,212,255,.4));
      line-height: 1.05;
    }

    .header-sub {
      margin-top: .9rem;
      font-size: .95rem;
      letter-spacing: .15em;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* Scanline dekoratiivinen viiva otsikossa */
    .scanline {
      display: block;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--glow-cyan), var(--glow-pink), transparent);
      margin: 1.4rem auto 0;
      width: 60%;
      opacity: .6;
      animation: pulse-line 3s ease-in-out infinite;
    }
    @keyframes pulse-line {
      0%,100% { opacity:.3; } 50% { opacity:.9; }
    }

    /* ── TOOLBAR ── */
    .toolbar {
      position: relative;
      z-index: 1;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: .75rem;
      padding: 1.25rem 2rem;
      border-bottom: 1px solid var(--border);
      background: rgba(8,13,31,.7);
      backdrop-filter: blur(6px);
    }

    .toolbar label {
      font-size: .8rem;
      letter-spacing: .12em;
      color: var(--text-muted);
      text-transform: uppercase;
    }



    .filter-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-muted);
      font-family: 'Rajdhani', sans-serif;
      font-size: .8rem;
      letter-spacing: .1em;
      padding: .4rem .85rem;
      cursor: pointer;
      transition: all .2s;
      text-transform: uppercase;
    }
    .filter-btn:hover, .filter-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 8px rgba(0,212,255,.2);
    }

    .count-badge {
      margin-left: auto;
      font-size: .78rem;
      letter-spacing: .12em;
      color: var(--text-muted);
    }

    /* ── GRID ── */
    main {
      position: relative;
      z-index: 1;
      padding: 2rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1.25rem;
    }

    /* ── CARD ── */
    .card {
      position: relative;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0;
      cursor: pointer;
      overflow: hidden;
      transition: transform .25s, box-shadow .25s, border-color .25s;
      animation: fadeIn .4s ease both;
    }
    @keyframes fadeIn {
      from { opacity:0; transform: translateY(14px); }
      to   { opacity:1; transform: translateY(0); }
    }

    .card:hover {
      transform: translateY(-4px) scale(1.015);
      box-shadow: 0 8px 32px rgba(0,0,0,.6), 0 0 18px var(--party-glow, rgba(0,212,255,.25));
      border-color: var(--party-color, var(--accent));
    }

    /* Yläpalkki puoluevärillä */
    .card-topbar {
      height: 4px;
      background: var(--party-color, var(--accent));
      box-shadow: 0 0 12px var(--party-color, var(--accent));
    }

    .card-body { padding: 1.1rem 1.2rem 1.2rem; }

    .card-party-tag {
      display: inline-block;
      font-size: .65rem;
      letter-spacing: .18em;
      padding: .2rem .6rem;
      border-radius: 2px;
      background: rgba(255,255,255,.06);
      border: 1px solid var(--party-color, var(--border));
      color: var(--party-color, var(--text-muted));
      text-transform: uppercase;
      margin-bottom: .6rem;
    }

    .card-name {
      font-family: 'Orbitron', monospace;
      font-size: .88rem;
      font-weight: 700;
      letter-spacing: .05em;
      line-height: 1.3;
      color: var(--text-primary);
      margin-bottom: .45rem;
    }

    .card-meta {
      font-size: .78rem;
      color: var(--text-muted);
      letter-spacing: .05em;
    }

    .card-arrow {
      position: absolute;
      bottom: .9rem;
      right: 1rem;
      font-size: .7rem;
      letter-spacing: .1em;
      color: var(--party-color, var(--accent));
      opacity: 0;
      transition: opacity .2s, transform .2s;
    }
    .card:hover .card-arrow { opacity:1; transform: translateX(4px); }

    /* ── MODAL OVERLAY ── */
    #modalOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.78);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s;
    }
    #modalOverlay.open {
      opacity: 1;
      pointer-events: all;
    }

    /* ── MODAL BOX ── */
    #modalBox {
      position: relative;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      width: min(620px, 96vw);
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 0 60px rgba(0,0,0,.8), 0 0 30px rgba(0,212,255,.1);
      transform: translateY(20px) scale(.97);
      transition: transform .28s;
    }
    #modalOverlay.open #modalBox {
      transform: translateY(0) scale(1);
    }

    .modal-topbar {
      height: 3px;
      background: linear-gradient(90deg, var(--glow-cyan), var(--glow-pink));
    }

    #modalContent {
      padding: 2rem 2rem 2.5rem;
    }

    .modal-label {
      font-size: .7rem;
      letter-spacing: .22em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: .2rem;
    }
    .modal-party-tag {
      display: inline-block;
      font-size: .72rem;
      letter-spacing: .16em;
      padding: .25rem .7rem;
      border-radius: 3px;
      background: rgba(255,255,255,.05);
      border: 1px solid var(--modal-party-color, var(--border));
      color: var(--modal-party-color, var(--text-muted));
      text-transform: uppercase;
      margin-bottom: .9rem;
    }
    .modal-name {
      font-family: 'Orbitron', monospace;
      font-size: 1.5rem;
      font-weight: 700;
      line-height: 1.2;
      color: var(--text-primary);
      margin-bottom: 1.5rem;
      letter-spacing: .04em;
    }

    .modal-divider {
      height: 1px;
      background: linear-gradient(90deg, var(--modal-party-color, var(--accent)), transparent);
      margin: 1.25rem 0;
      opacity: .5;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem 1.5rem;
    }

    .detail-item {}
    .detail-item .d-label {
      font-size: .7rem;
      letter-spacing: .18em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: .2rem;
    }
    .detail-item .d-value {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: .04em;
    }

    .puheenvuorot-bar {
      margin-top: 1.5rem;
    }
    .puheenvuorot-bar .d-label {
      font-size: .7rem;
      letter-spacing: .18em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: .5rem;
    }
    .bar-track {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 4px;
      height: 10px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--modal-party-color, var(--accent)), var(--glow-cyan));
      box-shadow: 0 0 8px var(--modal-party-color, var(--accent));
      border-radius: 4px;
      transition: width .7s cubic-bezier(.4,0,.2,1);
      width: 0%;
    }
    .bar-count {
      font-family: 'Orbitron', monospace;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--modal-party-color, var(--accent));
      margin-top: .4rem;
    }

    /* Loading / error */
    .modal-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      padding: 2rem 0;
      color: var(--text-muted);
      font-size: .9rem;
      letter-spacing: .1em;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--glow-cyan);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Sulje-nappi */
    #closeBtn {
      position: absolute;
      top: .85rem;
      right: 1rem;
      background: none;
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text-muted);
      cursor: pointer;
      font-family: 'Orbitron', monospace;
      font-size: .65rem;
      letter-spacing: .15em;
      padding: .3rem .65rem;
      transition: all .2s;
    }
    #closeBtn:hover {
      border-color: var(--glow-pink);
      color: var(--glow-pink);
      box-shadow: 0 0 8px rgba(255,0,122,.3);
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      grid-column: 1/-1;
      text-align: center;
      padding: 5rem 1rem;
      color: var(--text-muted);
    }
    .empty-state span {
      font-family: 'Orbitron', monospace;
      font-size: 2rem;
      display: block;
      margin-bottom: .5rem;
      opacity: .3;
    }

    /* ── HEADER SEARCH ── */
    .header-search {
      position: relative;
      overflow: visible;
    }
    .header-search input {
      width: 100%;
      background: rgba(11,17,40,.9);
      border: 1px solid #1a2a55;
      border-radius: 6px;
      color: #e8f4ff;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.1rem;
      letter-spacing: .06em;
      padding: .75rem 1.25rem;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .header-search input:focus {
      border-color: #00d4ff;
      box-shadow: 0 0 20px rgba(0,212,255,.2);
    }
    .header-search input::placeholder { color: #2a4a66; }
    .search-icon-left {
      position: absolute;
      right: .85rem;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      opacity: .35;
      color: #5a7a99;
    }

    /* ── HEADER SEARCH ROW ── */
    .header-search-row {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin: 1.5rem auto 0;
      width: min(700px, 92%);
      flex-wrap: wrap;
      justify-content: center;
    }
    .header-search {
      position: relative;
      flex: 1;
      min-width: 160px;
    }
    .header-filters {
      display: flex;
      gap: .5rem;
      align-items: center;
      flex-wrap: nowrap;
    }
    .hdr-btn {
      background: rgba(11,17,40,.85);
      border: 1px solid #1a2a55;
      border-radius: 5px;
      color: #5a7a99;
      font-family: 'Rajdhani', sans-serif;
      font-size: .8rem;
      letter-spacing: .12em;
      padding: .6rem .9rem;
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
      text-transform: uppercase;
    }
    .hdr-btn:hover { border-color: #00d4ff; color: #00d4ff; }
    .hdr-btn.active { background: rgba(0,212,255,.08); border-color: #00d4ff; color: #00d4ff; }
    .hdr-nykyiset { border-color: #1e4d2a !important; color: #3ec63e !important; }
    .hdr-nykyiset:hover, .hdr-nykyiset.active { background: rgba(62,198,62,.1) !important; border-color: #3ec63e !important; }
    .hdr-historialliset { border-color: #4d3a1a !important; color: #f5a623 !important; }
    .hdr-historialliset:hover, .hdr-historialliset.active { background: rgba(245,166,35,.1) !important; border-color: #f5a623 !important; }



    /* ── ANIMOITU PLACEHOLDER ── */
    .header-search input::placeholder {
      color: #00f5ff;
      text-shadow: 0 0 8px #00f5ff;
      animation: none;
    }
    @keyframes placeholder-pulse {
      from { opacity: 1; }
      to   { opacity: .4; }
    }
    .header-search input.pulse-placeholder::placeholder {
      animation: placeholder-pulse .9s ease-in-out infinite alternate;
    }

    /* ── SPLASH ── */
    #splash {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1rem 4rem;
      animation: fadeIn .5s ease;
    }
    .splash-inner {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
    }
    #reticle {
      width: 160px;
      height: 160px;
      opacity: .7;
    }
    .reticle-rotate {
      transform-origin: 100px 100px;
      animation: rot 8s linear infinite;
    }
    .reticle-rotate-slow {
      transform-origin: 100px 100px;
      animation: rot 20s linear infinite reverse;
    }
    @keyframes rot { to { transform: rotate(360deg); } }
    .splash-hint {
      font-family: 'Orbitron', monospace;
      font-size: .7rem;
      letter-spacing: .3em;
      color: #00d4ff;
      opacity: .7;
      animation: pulse-line 2s ease-in-out infinite;
    }
    .splash-sub {
      font-size: .85rem;
      letter-spacing: .1em;
      color: #2a4a66;
    }

    /* ── PUOLUE DROPDOWN ── */
    .puolue-dropdown-wrap {
      position: relative;
    }
    .puolue-dropdown {
      display: none;
      position: fixed;
      background: #080d1f;
      border: 1px solid #1a2a55;
      border-radius: 6px;
      padding: .5rem;
      z-index: 99999;
      min-width: 320px;
      flex-wrap: wrap;
      gap: .35rem;
      box-shadow: 0 8px 32px rgba(0,0,0,.8), 0 0 16px rgba(0,212,255,.1);
    }
    .puolue-dropdown.open {
      display: flex;
    }
    .puolue-dropdown .dp-btn {
      background: transparent;
      border: 1px solid #1a2a55;
      border-radius: 3px;
      color: #5a7a99;
      font-family: 'Rajdhani', sans-serif;
      font-size: .75rem;
      letter-spacing: .1em;
      padding: .3rem .6rem;
      cursor: pointer;
      transition: all .15s;
      text-transform: uppercase;
    }
    .puolue-dropdown .dp-btn:hover { border-color: #00d4ff; color: #00d4ff; }
    .puolue-dropdown .dp-btn.active { border-color: #00d4ff; color: #00d4ff; background: rgba(0,212,255,.08); }
    #btnNykyiset:hover, #btnNykyiset.active { background: rgba(62,198,62,.1) !important; border-color: #3ec63e !important; color: #3ec63e !important; }
    .hdr-lobbaus { border-color: #ff9500 !important; color: #ff9500 !important; }
    .hdr-lobbaus:hover, .hdr-lobbaus.active { background: rgba(255,149,0,.1) !important; border-color: #ff9500 !important; color: #ff9500 !important; }
    #btnHistorialliset:hover, #btnHistorialliset.active { background: rgba(245,166,35,.1) !important; border-color: #f5a623 !important; color: #f5a623 !important; }

    /* ── SIVUTUS ── */
    #pagination {
      position: relative;
      z-index: 1;
      display: none;
      align-items: center;
      justify-content: center;
      gap: .5rem;
      padding: 1.25rem 1rem 2rem;
      flex-wrap: wrap;
    }
    .page-btn {
      background: transparent;
      border: 1px solid #1a2a55;
      border-radius: 4px;
      color: #5a7a99;
      font-family: 'Orbitron', monospace;
      font-size: .65rem;
      letter-spacing: .1em;
      padding: .4rem .7rem;
      cursor: pointer;
      transition: all .2s;
      min-width: 36px;
    }
    .page-btn:hover  { border-color: #00d4ff; color: #00d4ff; }
    .page-btn.active { border-color: #00d4ff; color: #00d4ff; background: rgba(0,212,255,.1); }
    .page-btn:disabled { opacity: .25; cursor: default; }
    .page-info {
      font-size: .72rem;
      letter-spacing: .12em;
      color: #5a7a99;
      padding: 0 .5rem;
    }

    /* ── LOBBAUS ── */
    .lobbaus-container { min-height: 60px; }
    .lobbaus-bar-wrap { margin-bottom: .35rem; }
    .lobbaus-bar-label {
      display: flex; justify-content: space-between;
      font-size: .72rem; letter-spacing: .06em;
      color: var(--text-muted); margin-bottom: .18rem;
    }
    .lobbaus-bar-track {
      background: rgba(255,255,255,.05);
      border-radius: 3px; height: 8px; overflow: hidden;
    }
    .lobbaus-bar-fill {
      height: 100%; border-radius: 3px;
      background: linear-gradient(90deg, var(--party-c, #00d4ff), #00f5ff);
      transition: width .6s cubic-bezier(.4,0,.2,1);
    }
    .lobbaus-kausi-tabs {
      display: flex; gap: .35rem; flex-wrap: wrap;
      margin-bottom: .85rem;
    }
    .lobbaus-kausi-btn {
      background: transparent;
      border: 1px solid #1a2a55;
      border-radius: 3px; color: #5a7a99;
      font-family: 'Rajdhani', sans-serif;
      font-size: .7rem; letter-spacing: .1em;
      padding: .2rem .55rem; cursor: pointer;
      transition: all .15s;
    }
    .lobbaus-kausi-btn:hover  { border-color: #00d4ff; color: #00d4ff; }
    .lobbaus-kausi-btn.active { border-color: #00d4ff; color: #00d4ff; background: rgba(0,212,255,.08); }
    .lobbaus-rank {
      font-family: 'Orbitron', monospace;
      font-size: .65rem; color: var(--text-muted);
      margin-bottom: .5rem; letter-spacing: .1em;
    }
    .lobbaus-aikasarja {
      display: flex; align-items: flex-end;
      gap: 8px; height: 90px; margin-top: .5rem;
      padding: 0 .25rem;
    }
    .lobbaus-aikasarja-bar {
      flex: 1; border-radius: 3px 3px 0 0;
      background: var(--party-c, #00d4ff);
      opacity: .7; transition: height .5s ease;
      position: relative; min-width: 20px;
    }
    .lobbaus-aikasarja-bar:hover { opacity: 1; }
    .lobbaus-aikasarja-label {
      font-size: .6rem; color: #5a7a99;
      text-align: center; margin-top: .25rem;
      letter-spacing: .05em;
    }

    /* ── LOBBAUS-NÄKYMÄ ── */
    .lobbaus-panel {
      background: #080d1f;
      border: 1px solid #1a2a55;
      border-radius: 6px;
      padding: 1rem 1.25rem;
    }
    .lobbaus-panel-title {
      font-family: 'Orbitron', monospace;
      font-size: .62rem;
      letter-spacing: .2em;
      color: #5a7a99;
      margin-bottom: .85rem;
    }
    .lb-bar-row { margin-bottom: .4rem; cursor: pointer; }
    .lb-bar-row:hover .lb-bar-fill { opacity: 1; }
    .lb-bar-label { display:flex; justify-content:space-between; align-items:flex-start; gap:.5rem; font-size:.72rem; color:#8899aa; margin-bottom:.15rem; line-height:1.4; }
    .lb-bar-label span:first-child { flex:1; word-break:break-word; }
    .lb-bar-label span:last-child { color: #00d4ff; font-family:'Orbitron',monospace; font-size:.65rem; }

<script>
const PUOLUEVARIT = {
  KOK:  "#1a6fd8",  // sininen
  PS:   "#ff9500",  // oranssi
  SDP:  "#e01010",  // punainen
  KESK: "#009b50",  // vihreä
  VIHR: "#7bc142",  // vaaleanvihreä
  VAS:  "#cc0033",  // tummanpunainen
  RKP:  "#f5c400",  // keltainen
  KD:   "#003c8f",  // tummansininen
  LIIK: "#8a25cc",  // violetti
  SIN:  "#1e90ff",  // teräväsininen
  SKDL: "#cc2200",  // tiilenpunainen
  SKP:  "#aa0000",  // tummanpunainen
  SMP:  "#c87000",  // tummanruskea
  LKP:  "#00aacc",  // vaaleansininen
  ED:   "#558b2f",  // tummanvihreä
};
const puolueVari = p => PUOLUEVARIT[p] || "#00d4ff";

let KAIKKI = [];
let aktiivisuusPuolue = "";
let aikasuodatin = "";

/* ── Lataa index.json ── */
async function lataaHakemisto() {
  const grid = document.getElementById("grid");
  grid.innerHTML = `<div class="empty-state">
    <div class="spinner" style="margin:0 auto 1rem"></div>
    <div style="font-size:.85rem;color:#5a7a99;letter-spacing:.1em">LADATAAN HAKEMISTOA…</div>
  </div>`;
  try {
    const res = await fetch("edustajat_json/index.json");
    if (!res.ok) throw new Error("HTTP " + res.status);
    KAIKKI = await res.json();
    rakennaPuoluePainikkeet();
    suodataJaRenderöi();
  } catch(e) {
    grid.innerHTML = `<div class="empty-state"><span>✗</span>
      <div style="color:#e01010;font-size:.85rem;">Hakemistoa ei löydy:<br>
      <code>edustajat_json/index.json</code><br><br>
      Aja: <code>python luo_hakemisto.py</code></div></div>`;
  }
}

/* ── Rakenna puolue-dropdown ── */
function rakennaPuoluePainikkeet() {
  const dropdown = document.getElementById("puolueDropdown");
  const puolueet = [...new Set(KAIKKI.map(m => m.puolue).filter(p => p && p !== "–"))].sort();
  dropdown.innerHTML = "";
  puolueet.forEach(p => {
    const btn = document.createElement("button");
    btn.className = "dp-btn";
    btn.textContent = p;
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const isActive = btn.classList.contains("active");
      dropdown.querySelectorAll(".dp-btn").forEach(b => b.classList.remove("active"));
      if (!isActive) {
        btn.classList.add("active");
        setPuolue(p);
        document.getElementById("btnPuolue").textContent = p + " ▾";
        document.getElementById("btnPuolue").style.borderColor = "#00d4ff";
        document.getElementById("btnPuolue").style.color = "#00d4ff";
      } else {
        setPuolue("");
        document.getElementById("btnPuolue").textContent = "Puolue ▾";
        document.getElementById("btnPuolue").style.borderColor = "";
        document.getElementById("btnPuolue").style.color = "";
      }
      dropdown.classList.remove("open");
    });
    dropdown.appendChild(btn);
  });
}

// Dropdown toggle — position:fixed napin alle
document.getElementById("btnPuolue").addEventListener("click", (e) => {
  e.stopPropagation();
  const dd  = document.getElementById("puolueDropdown");
  const btn = document.getElementById("btnPuolue");
  const rect = btn.getBoundingClientRect();
  dd.style.top  = (rect.bottom + 6) + "px";
  dd.style.left = rect.left + "px";
  dd.classList.toggle("open");
});

// Sulje dropdown kun klikataan muualle
document.addEventListener("click", () => {
  document.getElementById("puolueDropdown").classList.remove("open");
});

/* ── Suodatus ── */
function suodataJaRenderöi() {
  const q = document.getElementById("searchInput").value.toLowerCase().trim();
  const lista = KAIKKI.filter(m => {
    if (aikasuodatin === "nykyiset" && !m.nykyinen) return false;
    if (aikasuodatin === "hist"     &&  m.nykyinen) return false;
    if (aktiivisuusPuolue && m.puolue !== aktiivisuusPuolue) return false;
    if (!q) return true;
    return (
      (m.nimi       ||"").toLowerCase().includes(q) ||
      (m.puolue     ||"").toLowerCase().includes(q) ||
      (m.kotikunta  ||"").toLowerCase().includes(q) ||
      (m.vaalipiiri ||"").toLowerCase().includes(q) ||
      (m.koulutus   ||"").toLowerCase().includes(q) ||
      (m.syntymavuosi||"").includes(q)
    );
  });
  renderEdustajat(lista);
}

document.getElementById("searchInput").addEventListener("input", function() {
  const q = this.value.trim();
  const arrow = document.getElementById("searchArrow");
  if (q.length > 0 || aktiivisuusPuolue || aikasuodatin) {
  
    naytaTulokset();
    suodataJaRenderöi();
  } else {

    naytaSplash();
  }
});

function naytaTulokset() {
  document.getElementById("splash").style.display    = "none";
  document.getElementById("grid").style.display      = "grid";
  document.getElementById("tulosrivi").style.display = "flex";
  document.getElementById("tulosrivi").style.alignItems = "center";
  document.getElementById("pagination").style.display = "flex";
}

function naytaSplash() {
  document.getElementById("splash").style.display    = "flex";
  document.getElementById("grid").style.display      = "none";
  document.getElementById("tulosrivi").style.display = "none";
  document.getElementById("pagination").style.display = "none";
  document.getElementById("countBadge").textContent  = "";
  aktiivisuusPuolue = "";
  aikasuodatin = "";
  document.getElementById("btnNykyiset").classList.remove("active");
  document.getElementById("btnHistorialliset").classList.remove("active");
  document.getElementById("btnPuolue").textContent = "Puolue ▾";
  document.getElementById("btnPuolue").classList.remove("active");
  document.getElementById("puolueDropdown").querySelectorAll(".dp-btn").forEach(b=>b.classList.remove("active"));
}

function tyhjennaHaku() {
  document.getElementById("searchInput").value = "";
  naytaSplash();
}

function setPuolue(p) {
  aktiivisuusPuolue = p;
  if (p || aikasuodatin || document.getElementById("searchInput").value.trim()) {
    naytaTulokset();
    suodataJaRenderöi();
  } else {
    naytaSplash();
  }
}

function setAika(tila) {
  aikasuodatin = (aikasuodatin === tila) ? "" : tila;
  document.getElementById("btnNykyiset").classList.toggle("active", aikasuodatin === "nykyiset");
  document.getElementById("btnHistorialliset").classList.toggle("active", aikasuodatin === "hist");
  if (aikasuodatin || aktiivisuusPuolue || document.getElementById("searchInput").value.trim()) {
    naytaTulokset();
    suodataJaRenderöi();
  } else {
    naytaSplash();
  }
}

document.getElementById("btnNykyiset").addEventListener("click", () => setAika("nykyiset"));
document.getElementById("btnHistorialliset").addEventListener("click", () => setAika("hist"));


/* ── Sivutus ── */
const SIVULLA = 50;
let nykyinenSivu = 1;
let suodatettuLista = [];

function kaannaNimi(nimi) {
  const osat = nimi.trim().split(" ");
  if (osat.length < 2) return nimi;
  const suku = osat[osat.length - 1];
  const etu  = osat.slice(0, -1).join(" ");
  return `${suku} ${etu}`;
}

function luoKortti(m) {
  const vari = puolueVari(m.puolue);
  const card = document.createElement("div");
  card.className = "card";
  card.style.setProperty("--party-color", vari);
  card.style.setProperty("--party-glow", vari + "55");
  card.setAttribute("role","button"); card.setAttribute("tabindex","0");
  const paikkatieto = m.nykyinen ? (m.vaalipiiri||m.kotikunta||"") : (m.kotikunta||"");
  const vuodet = m.kuolinvuosi ? `${m.syntymavuosi||"?"}–${m.kuolinvuosi}`
               : m.syntymavuosi ? `s. ${m.syntymavuosi}` : "";
  const kuvaHtml = m.kuva
    ? `<img src="${m.kuva}" alt="${m.nimi}" loading="lazy"
         onerror="this.style.display='none'"
         style="position:absolute;top:.7rem;right:.7rem;width:44px;height:54px;
                object-fit:cover;border-radius:3px;
                border:1px solid var(--party-color, #1a2a55);
                opacity:.85;">`
    : "";
  card.innerHTML = `
    <div class="card-topbar"></div>
    <div class="card-body" style="position:relative">
      ${kuvaHtml}
      <div class="card-party-tag">${m.puolue||"–"}</div>
      <div class="card-name" style="padding-right:${m.kuva?"54px":"0"}">${kaannaNimi(m.nimi)}</div>
      <div class="card-meta">${[paikkatieto,vuodet].filter(Boolean).join(" · ")}</div>
    </div>
    <div class="card-arrow">AVAA →</div>`;
  card.addEventListener("click", () => openTTLProfile(m));
  card.addEventListener("keydown", e => { if(e.key==="Enter"||e.key===" ") openTTLProfile(m); });
  return card;
}

function renderSivu(sivu) {
  nykyinenSivu = sivu;
  const grid  = document.getElementById("grid");
  const pagin = document.getElementById("pagination");
  grid.innerHTML = "";

  if (!suodatettuLista.length) {
    grid.innerHTML = `<div class="empty-state"><span>∅</span>Ei hakutuloksia</div>`;
    document.getElementById("countBadge").textContent = "";
    pagin.style.display = "none";
    return;
  }

  const alku  = (sivu - 1) * SIVULLA;
  const loppu = Math.min(alku + SIVULLA, suodatettuLista.length);
  const sivuja = Math.ceil(suodatettuLista.length / SIVULLA);

  suodatettuLista.slice(alku, loppu).forEach((m, i) => {
    const c = luoKortti(m);
    c.style.animationDelay = `${Math.min(i,40)*30}ms`;
    grid.appendChild(c);
  });

  // Päivitä count
  const pohja = KAIKKI.filter(m =>
    aikasuodatin === "nykyiset" ? m.nykyinen : aikasuodatin === "hist" ? !m.nykyinen : true
  );
  document.getElementById("countBadge").textContent =
    `${alku+1}–${loppu} / ${suodatettuLista.length} edustajaa`;

  // Sivutuspainikkeet
  if (sivuja <= 1) { pagin.style.display = "none"; return; }
  pagin.style.display = "flex";
  pagin.innerHTML = "";

  const prev = document.createElement("button");
  prev.className = "page-btn"; prev.textContent = "‹"; prev.disabled = sivu === 1;
  prev.addEventListener("click", () => { renderSivu(sivu-1); window.scrollTo({top:0,behavior:"smooth"}); });
  pagin.appendChild(prev);

  // Sivunumerot älykkäällä ellipsillä
  const nayta = [];
  for (let s = 1; s <= sivuja; s++) {
    if (s === 1 || s === sivuja || Math.abs(s - sivu) <= 2) nayta.push(s);
    else if (nayta[nayta.length-1] !== "…") nayta.push("…");
  }
  nayta.forEach(s => {
    if (s === "…") {
      const sp = document.createElement("span");
      sp.className = "page-info"; sp.textContent = "…";
      pagin.appendChild(sp);
    } else {
      const btn = document.createElement("button");
      btn.className = "page-btn" + (s === sivu ? " active" : "");
      btn.textContent = s;
      btn.addEventListener("click", () => { renderSivu(s); window.scrollTo({top:0,behavior:"smooth"}); });
      pagin.appendChild(btn);
    }
  });

  const next = document.createElement("button");
  next.className = "page-btn"; next.textContent = "›"; next.disabled = sivu === sivuja;
  next.addEventListener("click", () => { renderSivu(sivu+1); window.scrollTo({top:0,behavior:"smooth"}); });
  pagin.appendChild(next);
}

/* ── Renderöi kortit ── */
function renderEdustajat(lista) {
  // Aakkosjärjestys sukunimen mukaan
  suodatettuLista = [...lista].sort((a, b) =>
    a.nimi.split(" ").pop().localeCompare(b.nimi.split(" ").pop(), "fi")
  );
  nykyinenSivu = 1;
  renderSivu(1);
}

/* ================================================================
   MODAL + EDUSKUNTA API
   ================================================================ */
const API = "https://avoindata.eduskunta.fi/api/v1/tables";

async function openTTLProfile(m) {
  const overlay = document.getElementById("modalOverlay");
  const vari    = puolueVari(m.puolue);
  overlay.style.setProperty("--modal-party-color", vari);
  document.documentElement.style.setProperty("--modal-party-color", vari);
  overlay.classList.add("open");
  document.body.style.overflow = "hidden";
  renderModalSkeleton(m, vari);


}

function haePersonId(m) {
  // Yritetään saada id eduskunta-linkistä: .../Sivut/1306.aspx
  if (m.eduskunta) {
    const match = m.eduskunta.match(/\/(\d+)\.aspx/);
    if (match) return match[1];
  }
  // Yritetään tiedostonimestä: ei suoraan saatavilla
  return null;
}



/* ── Skeleton: näytetään heti index.json:n tiedot ── */
function renderModalSkeleton(m, vari) {
  const content = document.getElementById("modalContent");
  const vuodet = m.kuolinvuosi
    ? `${m.syntymavuosi||"?"}–${m.kuolinvuosi}`
    : m.syntymavuosi ? `${m.syntymavuosi}–` : "–";
  const kuvaHtml = m.kuva
    ? `<img src="${m.kuva}" alt="${m.nimi}" onerror="this.style.display='none'"
         style="width:72px;height:88px;object-fit:cover;border-radius:3px;
                border:1px solid ${vari};float:right;margin:0 0 .5rem 1rem;">`
    : "";
  content.innerHTML = `
    <div class="modal-label">Kansanedustaja · ${m.puolue||"–"}</div>
    <div class="modal-party-tag" style="--modal-party-color:${vari}">${m.puolue||"–"}</div>
    ${kuvaHtml}
    <div class="modal-name" id="modalName">${m.nimi}</div>
    <div class="modal-divider"></div>
    <div id="accordion-container">
      ${accordionItem("perustiedot","PERUSTIEDOT",`
        <div class="detail-grid">
          <div class="detail-item"><div class="d-label">Kotikunta</div><div class="d-value">${m.kotikunta||"–"}</div></div>
          <div class="detail-item"><div class="d-label">Vaalipiiri</div><div class="d-value">${m.vaalipiiri||"–"}</div></div>
          <div class="detail-item"><div class="d-label">Syntymävuosi</div><div class="d-value">${vuodet}</div></div>
          <div class="detail-item"><div class="d-label">Vaalikaudet</div><div class="d-value">${m.vaalikaudet||"–"}</div></div>
          <div class="detail-item"><div class="d-label">Koulutus</div><div class="d-value">${m.koulutus||"–"}</div></div>
          <div class="detail-item"><div class="d-label">Status</div><div class="d-value" style="color:${m.nykyinen?"#3ec63e":"#f5a623"}">${m.nykyinen?"● aktiivinen":"● päättynyt"}</div></div>
        </div>`, true)}
      ${accordionItem("lobbaus","LOBBAUSMERKINNÄT",`
        <div id="lobbaus-${m.nimi.replace(/\s+/g,'-')}" class="lobbaus-container">
          <div class="spinner" style="margin:.5rem auto"></div>
        </div>`)}
      ${accordionItem("linkit","LINKIT & YHTEYSTIEDOT",`
        <div style="display:flex;flex-direction:column;gap:.6rem">
          ${m.eduskunta ? lnk(m.eduskunta,"PROFIILI EDUSKUNTA.FI ↗",vari) : ""}
          ${m.wiki      ? lnk(m.wiki,"WIKIPEDIA ↗","#aaa") : ""}
          ${m.twitter   ? lnk("https://twitter.com/"+m.twitter,"TWITTER / X ↗","#1d9bf0") : ""}
          ${!m.eduskunta && !m.wiki && !m.twitter ? '<span style="color:#5a7a99;font-size:.82rem">Ei linkkejä saatavilla</span>' : ""}
        </div>`)}
      ${accordionItem("toiminta","ALOITTEET & PUHEENVUOROT",`
        <div style="display:flex;flex-direction:column;gap:.6rem">
          ${lnk("https://www.eduskunta.fi/FI/search/Sivut/Vaskiresults.aspx#Default={%22k%22:%22(EDKToimijaCompleteMatching:%5C%22"+encodeURIComponent(m.nimi)+"%5C%22)%20(Asiakirjatyyppinimi:Lakialoite%20OR%20Asiakirjatyyppinimi:Toimenpidealoite)%22}","ALOITTEET ↗",vari)}
          ${lnk("https://www.eduskunta.fi/FI/search/Sivut/Vaskiresults.aspx#Default={%22k%22:%22(EDKToimijaCompleteMatching:%5C%22"+encodeURIComponent(m.nimi)+"%5C%22)%20Asiakirjatyyppinimi:%5C%22Kirjallinen%20kysymys%5C%22%22}","KIRJALLISET KYSYMYKSET ↗",vari)}
          ${lnk("https://www.eduskunta.fi/FI/search/Sivut/Vaskiresults.aspx#Default={%22k%22:%22EDKPuhujaCompleteMatching:%5C%22"+encodeURIComponent(m.nimi.split(" ").reverse().join(" "))+"%5C%22%22}","PUHEENVUOROT ↗",vari)}
        </div>`)}
      ${accordionItem("sidonnaisuudet","SIDONNAISUUDET",`
        <div style="display:flex;flex-direction:column;gap:.6rem">
          ${m.eduskunta ? lnk(m.eduskunta,"SIDONNAISUUDET EDUSKUNTA.FI ↗",vari) : '<span style="color:#5a7a99;font-size:.82rem">Ei saatavilla</span>'}
        </div>`)}
    </div>`;

  // Accordion-logiikka
  content.querySelectorAll(".accordion-header").forEach((h, idx) => {
    const ids = ["perustiedot","lobbaus","linkit","toiminta","sidonnaisuudet"];
    h.addEventListener("click", () => {
      const body = h.nextElementSibling;
      const isOpen = body.style.maxHeight && body.style.maxHeight !== "0px";
      body.style.maxHeight = isOpen ? "0px" : body.scrollHeight + "px";
      h.querySelector(".accordion-arrow").style.transform = isOpen ? "rotate(0deg)" : "rotate(90deg)";
      if (!isOpen && ids[idx]) onAccordionOpen(ids[idx], m, vari);
    });
  });
}

function accordionItem(id, label, content, open=false) {
  return `
    <div class="accordion-item">
      <div class="accordion-header">
        <span>${label}</span>
        <span class="accordion-arrow" style="transition:transform .2s;display:inline-block;transform:${open?"rotate(90deg)":"rotate(0deg)"}">›</span>
      </div>
      <div class="accordion-body" style="max-height:${open?"500px":"0px"};overflow:hidden;transition:max-height .3s ease">
        <div style="padding:.75rem 1rem">${content}</div>
      </div>
    </div>`;
}

function lnk(url, teksti, vari) {
  return `<a href="${url}" target="_blank" rel="noopener"
    style="color:${vari};font-size:.75rem;letter-spacing:.1em;text-decoration:none;
           border:1px solid ${vari}55;padding:.25rem .6rem;border-radius:3px;
           display:inline-block">${teksti}</a>`;
}

let LOBBAUS_INDEX = null;

async function lataaLobbausIndex() {
  if (LOBBAUS_INDEX) return LOBBAUS_INDEX;
  try {
    const res = await fetch("lobbaus_json/index.json?v=" + Date.now());
    if (res.ok) LOBBAUS_INDEX = await res.json();
  } catch(_) {}
  return LOBBAUS_INDEX;
}

function paivitaAccordionKorkeus(el) {
  // Etsi lähin avoinna oleva accordion-body ja päivitä sen korkeus
  let body = el;
  while (body && !body.classList.contains("accordion-body")) {
    body = body.parentElement;
  }
  if (body && body.style.maxHeight && body.style.maxHeight !== "0px") {
    body.style.maxHeight = body.scrollHeight + "px";
  }
}

async function naytaLobbausTiedot(m, vari) {
  const containerId = "lobbaus-" + m.nimi.replace(/\s+/g,"-");
  const el = document.getElementById(containerId);
  if (!el) return;

  const idx = await lataaLobbausIndex();
  if (!idx) {
    el.innerHTML = '<span style="color:#5a7a99;font-size:.82rem">Lobbausdata ei saatavilla</span>';
    return;
  }

  const keData = idx.kansanedustajat[m.nimi];
  if (!keData) {
    el.innerHTML = '<span style="color:#5a7a99;font-size:.82rem">Ei merkintöjä avoimuusrekisterissä</span>';
    return;
  }

  const maxMaara = Math.max(...keData.kaudet.map(k => k.maara));
  const yhteensa = keData.yhteensa;

  // Sijoitus suoraan index.json:sta — ei erillistä fetchiä
  const sijoitus      = keData.sijoitus_viimeisin || "–";
  const sijoitusKausi = keData.sijoitus_kausi     || "";

  // Aikasarjapalkit
  const BAR_MAX_PX = 56;
  const aikaHtml = keData.kaudet.map(k => {
    const px = maxMaara > 0 ? Math.max(4, Math.round(k.maara / maxMaara * BAR_MAX_PX)) : 4;
    const lyhyt = k.kausi_label.replace(/^\d+\.\d+–(\d+\.\d+\.\d+)$/, "$1")
                               .replace(/^(\d+)\.(\d+)–.*\.(\d+)$/, "$1.$2/$3");
    return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end">
      <div style="font-size:.58rem;color:${vari};margin-bottom:2px;font-family:'Orbitron',monospace">${k.maara}</div>
      <div style="width:100%;height:${px}px;background:${vari};border-radius:3px 3px 0 0;opacity:.8"
           title="${k.kausi_label}: ${k.maara} mainintaa"></div>
      <div style="font-size:.58rem;color:#5a7a99;text-align:center;margin-top:3px;letter-spacing:.03em;white-space:nowrap">${k.kausi_label.replace(/^\d+\.\d+–/,"").replace(/\.(\d{4})$/,"/$1")}</div>
    </div>`;
  }).join("");

  // Hae myös toimintailmoitusdata indeksistä
  const tiData = idx.toimintailmoitukset ? idx.toimintailmoitukset[m.nimi] : null;


  el.style.setProperty("--party-c", vari);
  setTimeout(() => paivitaAccordionKorkeus(el), 50);
  el.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:.85rem">
      <div>
        <div class="d-label">Maininnat yhteensä</div>
        <div style="font-family:'Orbitron',monospace;font-size:1.3rem;font-weight:700;color:${vari}">${yhteensa}</div>
        ${tiData && tiData.nimikkeet ? '<div style="font-size:.68rem;color:#5a7a99;margin-top:.2rem">'+Object.entries(tiData.nimikkeet).sort((a,b)=>b[1]-a[1]).map(([nim,n])=>nim+' ('+n+')').join(', ')+'</div>' : ''}
      </div>
      <div>
        <div class="d-label">Sijoitus ${sijoitusKausi}</div>
        <div style="font-family:'Orbitron',monospace;font-size:1.3rem;font-weight:700;color:${vari}">${sijoitus !== "–" ? "#" + sijoitus : "–"}</div>
      </div>
    </div>
    <div class="d-label" style="margin-bottom:.4rem">Maininnat kausittain</div>
    <div class="lobbaus-aikasarja">${aikaHtml}</div>
    <div id="lobbaus-org-${containerId}" style="margin-top:1rem">
      <div class="d-label" style="margin-bottom:.4rem">Lobbaukset organisaatioittain</div>
      <div class="spinner" style="margin:.4rem auto;width:20px;height:20px;border-width:2px"></div>
    </div>
    ${tiData ? `<div style="margin-top:1.25rem;border-top:1px solid #1a2a55;padding-top:1rem">
      <div class="d-label" style="margin-bottom:.5rem">TOP LOBBARIT — TOIMINTAILMOITUKSET</div>
      ${tiData.top_lobbarit.slice(0,5).map(x => {
        const org = x[0]; const n = x[1];
        const maxN = tiData.top_lobbarit[0][1];
        const pct = Math.round(n/maxN*100);
        const lyhyt = org.length > 38 ? org.slice(0,36)+"…" : org;
        return '<div class="lobbaus-bar-wrap"><div class="lobbaus-bar-label"><span>'+lyhyt+'</span><span style="color:'+vari+'">'+n+'</span></div><div class="lobbaus-bar-track"><div class="lobbaus-bar-fill" style="width:'+pct+'%;background:'+vari+'"></div></div></div>';
      }).join("")}
      <div class="d-label" style="margin-top:.85rem;margin-bottom:.4rem">YHTEYDENPIDON TAVAT</div>
      <div style="display:flex;flex-wrap:wrap;gap:.3rem">
        ${(() => {
          // Normalisoi tavat pääkategorioihin
          const kategoriat = {
            "Sähköposti": 0,
            "Tapaaminen": 0,
            "Puhelu": 0,
            "Verkkovierailu": 0,
            "Viesti/some": 0,
            "Tapahtuma": 0,
            "Muu": 0
          };
          Object.entries(tiData.tavat).forEach(([tapa, n]) => {
            const t = tapa.toLowerCase();
            if (t.includes("sähköposti") || t.includes("kirjeenvaihto")) kategoriat["Sähköposti"] += n;
            if (t.includes("tapaaminen") || t.includes("vierailu")) kategoriat["Tapaaminen"] += n;
            if (t.includes("puhelin") || t.includes("puhelinsoitto")) kategoriat["Puhelu"] += n;
            if (t.includes("verkkotapaaminen") || t.includes("etä")) kategoriat["Verkkovierailu"] += n;
            if (t.includes("tekstiviesti") || t.includes("pikaviesti") || t.includes("sosiaalisen median yksityisviesti") || t.includes("linkedin")) kategoriat["Viesti/some"] += n;
            if (t.includes("tapahtuma") || t.includes("tilaisuus") || t.includes("osallistuminen") || t.includes("avajaiset") || t.includes("kiertotalouden") || t.includes("rakentamisen") || t.includes("julkaisu") || t.includes("kutsuvierastilaisuus")) kategoriat["Tapahtuma"] += n;
          });
          // Jos ei osunut mihinkään → Muu
          const yhteensa_norm = Object.values(kategoriat).reduce((a,b)=>a+b,0);
          const yhteensa_raw  = Object.values(tiData.tavat).reduce((a,b)=>a+b,0);
          kategoriat["Muu"] += Math.max(0, yhteensa_raw - yhteensa_norm + kategoriat["Muu"]);
          return Object.entries(kategoriat)
            .filter(([,n]) => n > 0)
            .sort((a,b) => b[1]-a[1])
            .map(([kat, n]) =>
              '<span style="background:rgba(255,255,255,.05);border:1px solid '+vari+'55;border-radius:3px;padding:.2rem .5rem;font-size:.72rem;color:'+vari+'">'+kat+' <strong style="color:#fff">'+n+'</strong></span>'
            ).join("");
        })()}
      </div>
      <div class="d-label" style="margin-top:.85rem;margin-bottom:.4rem">LOBBAUSAIHEET</div>
      ${tiData.top_aiheet.slice(0,4).map(x => {
        const aihe = x[0]; const n = x[1];
        const lyhyt = aihe.length > 85 ? aihe.slice(0,83)+"…" : aihe;
        return '<div style="font-size:.73rem;color:#8899aa;padding:.25rem 0;border-bottom:1px solid #1a2a5588;line-height:1.45">'+lyhyt+'<span style="color:'+vari+';margin-left:.4rem;font-size:.68rem">'+n+'x</span></div>';
      }).join("")}
    </div>` : ""}`;

  // Lataa organisaatiodata
  lataaOrgData(m, keData, vari, "lobbaus-org-" + containerId);
}

async function lataaOrgData(m, keData, vari, orgElId) {
  const orgEl = document.getElementById(orgElId);
  if (!orgEl) return;

  // Kerää org-data kaikista kausista
  const orgYhteensa = {};
  for (const k of keData.kaudet) {
    try {
      const res = await fetch("lobbaus_json/" + k.kausi_id + ".json");
      if (!res.ok) continue;
      const data = await res.json();
      const ke_org = data.ke_org || {};
      const orgs = ke_org[m.nimi] || [];
      for (const o of orgs) {
        orgYhteensa[o.org] = (orgYhteensa[o.org] || 0) + o.maara;
      }
    } catch(_) {}
  }

  const orgLista = Object.entries(orgYhteensa)
    .sort((a,b) => b[1]-a[1]).slice(0,8);

  if (!orgLista.length) {
    orgEl.innerHTML = '<div class="d-label">Organisaatiodata ei saatavilla</div>';
    return;
  }

  const maxOrg = orgLista[0][1];
  const barsHtml = orgLista.map(([org, maara]) => {
    const pct = Math.round(maara / maxOrg * 100);
    const lyhyt = org.length > 35 ? org.slice(0,33) + "…" : org;
    return `<div class="lobbaus-bar-wrap">
      <div class="lobbaus-bar-label">
        <span>${lyhyt}</span><span style="color:${vari}">${maara}</span>
      </div>
      <div class="lobbaus-bar-track">
        <div class="lobbaus-bar-fill" style="width:${pct}%;--party-c:${vari}"></div>
      </div>
    </div>`;
  }).join("");

  orgEl.innerHTML = `
    <div class="d-label" style="margin-bottom:.5rem">Organisaatiot (kaikki kaudet)</div>
    ${barsHtml}`;
}

/* ================================================================
   LOBBAUS-NÄKYMÄ
   ================================================================ */
let LOBBAUS_YHT   = null;
let AKTIIVINEN_KAUSI = "kaikki";
const LOBBAUS_VARIT = ["#00d4ff","#ff9500","#3ec63e","#d00020","#8a25cc","#f5c400","#1a6fd8","#009b50"];

async function lataaLobbausYhteenveto() {
  if (LOBBAUS_YHT) return LOBBAUS_YHT;
  try {
    const res = await fetch("lobbaus_json/yhteenveto.json?v=" + Date.now());
    if (res.ok) LOBBAUS_YHT = await res.json();
  } catch(_) {}
  return LOBBAUS_YHT;
}

async function naytaLobbausNakyma() {
  const nakyma = document.getElementById("lobbausNakyma");
  const grid   = document.getElementById("grid");
  const pagin  = document.getElementById("pagination");
  const splash = document.getElementById("splash");

  // Piilota muut näkymät
  if (splash)  splash.style.display   = "none";
  if (grid)    grid.style.display     = "none";
  if (pagin)   pagin.style.display    = "none";
  document.getElementById("tulosrivi").style.display = "none";
  nakyma.style.display = "block";

  document.getElementById("btnLobbaus").classList.add("active");
  document.getElementById("btnNykyiset").classList.remove("active");
  document.getElementById("btnHistorialliset").classList.remove("active");

  const yht = await lataaLobbausYhteenveto();
  if (!yht) {
    nakyma.innerHTML = '<div style="color:#e01010;padding:2rem">Lobbausdataa ei löydy. Aja muunna_toimintailmoitukset.py.</div>';
    return;
  }

  // Rakenna kausisuodattimet
  const kaudet = Object.entries(yht.kausi_data || {}).sort((a,b) => a[0].localeCompare(b[0]));
  const tabEl  = document.getElementById("lobbausKausiTabit");
  tabEl.innerHTML = "";
  [["kaikki","Kaikki kaudet"], ...kaudet.map(([id,d]) => [id, d.label])].forEach(([id, label]) => {
    const btn = document.createElement("button");
    btn.className = "lb-kausi-btn" + (id === AKTIIVINEN_KAUSI ? " active" : "");
    btn.textContent = label;
    btn.addEventListener("click", () => {
      AKTIIVINEN_KAUSI = id;
      tabEl.querySelectorAll(".lb-kausi-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      paivitaLobbausData(yht);
    });
    tabEl.appendChild(btn);
  });

  paivitaLobbausData(yht);
}

function paivitaLobbausData(yht) {
  renderKausiChart(yht);

  const kausi     = AKTIIVINEN_KAUSI;
  const kausiData = kausi !== "kaikki" ? (yht.kausi_data[kausi] || {}) : null;

  // Top KE
  const topKE = kausiData
    ? Object.entries(kausiData.ke||{}).sort((a,b)=>b[1]-a[1])
    : yht.top_ke;
  renderPalkit("lobbausTopKE", topKE.slice(0,15), "#00d4ff", (nimi) => {
    piilotaLobbausNakyma();
    document.getElementById("searchInput").value = nimi;
    naytaTulokset();
    suodataJaRenderöi();
  });

  // Top Org
  const topOrg = kausiData && kausiData.org
    ? Object.entries(kausiData.org).sort((a,b)=>b[1]-a[1])
    : yht.top_org;
  renderPalkit("lobbausTopOrg", topOrg.slice(0,15), "#ff9500");

  // Aiheet
  const topAiheet = kausiData && kausiData.aiheet
    ? Object.entries(kausiData.aiheet).sort((a,b)=>b[1]-a[1])
    : yht.top_aiheet;
  renderPalkit("lobbausAiheet", topAiheet.slice(0,12), "#3ec63e");

  // Tavat
  const tavat = kausiData && kausiData.tavat
    ? normTavat(kausiData.tavat)
    : yht.tavat;
  renderTavat(tavat);
}

function normTavat(raw) {
  const kat = {"Sähköposti":0,"Tapaaminen":0,"Puhelu":0,"Verkkovierailu":0,"Viesti/some":0,"Tapahtuma":0,"Muu":0};
  Object.entries(raw).forEach(([tapa,n]) => {
    const t = tapa.toLowerCase();
    if (t.includes("hköposti")||t.includes("kirjeenvaihto")) kat["Sähköposti"]+=n;
    if (t.includes("tapaaminen")||t.includes("vierailu")) kat["Tapaaminen"]+=n;
    if (t.includes("puhelin")) kat["Puhelu"]+=n;
    if (t.includes("verkkotapaaminen")) kat["Verkkovierailu"]+=n;
    if (t.includes("tekstiviesti")||t.includes("pikaviesti")||t.includes("yksityisviesti")||t.includes("linkedin")) kat["Viesti/some"]+=n;
    if (["tapahtuma","tilaisuus","osallistuminen","avajaiset","julkaisu"].some(x=>t.includes(x))) kat["Tapahtuma"]+=n;
  });
  const tot=Object.values(kat).reduce((a,b)=>a+b,0);
  const raaka=Object.values(raw).reduce((a,b)=>a+b,0);
  kat["Muu"]+=Math.max(0,raaka-tot);
  return Object.fromEntries(Object.entries(kat).filter(([,v])=>v>0));
}

function renderKausiChart(yht) {
  const el = document.getElementById("lobbausKausiChart");
  if (!el || !yht.kausi_data) return;
  const kaudet = Object.entries(yht.kausi_data);
  const maxVal = Math.max(...kaudet.map(([,d]) => Object.values(d.ke||{}).reduce((a,b)=>a+b,0)));
  const BAR_H  = 80;
  el.innerHTML = kaudet.map(([id, d], i) => {
    const tot = Object.values(d.ke||{}).reduce((a,b)=>a+b,0);
    const px  = maxVal > 0 ? Math.max(6, Math.round(tot/maxVal*BAR_H)) : 6;
    const aktv = AKTIIVINEN_KAUSI === id ? "border:1px solid #ff9500;" : "";
    return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;cursor:pointer"
              onclick="AKTIIVINEN_KAUSI='${id}';document.querySelectorAll('.lb-kausi-btn').forEach((b,j)=>b.classList.toggle('active',j===${i+1}));paivitaLobbausData(LOBBAUS_YHT)">
      <div style="font-size:.58rem;color:#ff9500;margin-bottom:3px;font-family:'Orbitron',monospace">${tot}</div>
      <div style="width:100%;height:${px}px;background:#ff9500;opacity:.75;border-radius:3px 3px 0 0;${aktv}"></div>
      <div style="font-size:.58rem;color:#5a7a99;text-align:center;margin-top:4px">${d.label}</div>
    </div>`;
  }).join("");
}

function renderPalkit(elId, lista, vari, onClick) {
  const el = document.getElementById(elId);
  if (!el || !lista.length) return;
  const maxN = lista[0][1];
  el.innerHTML = lista.map(([label, n]) => {
    const pct   = Math.round(n/maxN*100);
    const lyhyt = label;
    const klik  = onClick ? `style="cursor:pointer" onclick="(${onClick.toString()})('${label.replace(/'/g,"\'")}')"`  : "";
    return `<div class="lb-bar-row" ${klik}>
      <div class="lb-bar-label"><span>${lyhyt}</span><span>${n}</span></div>
      <div class="lb-bar-track"><div class="lb-bar-fill" style="width:${pct}%;background:${vari}"></div></div>
    </div>`;
  }).join("");
}

function renderTavat(tavat) {
  const el = document.getElementById("lobbausTavat");
  if (!el || !tavat) return;
  const lista  = Object.entries(tavat).sort((a,b)=>b[1]-a[1]);
  const yhteensa = lista.reduce((s,[,n])=>s+n,0);
  el.innerHTML = lista.map(([tapa,n],i) => {
    const pct = Math.round(n/yhteensa*100);
    return `<div class="lb-donut-row">
      <div class="lb-donut-dot" style="background:${LOBBAUS_VARIT[i%LOBBAUS_VARIT.length]}"></div>
      <div style="flex:1;font-size:.75rem;color:#8899aa">${tapa}</div>
      <div style="font-size:.72rem;color:#fff;font-family:'Orbitron',monospace;min-width:80px;text-align:right">${n.toLocaleString()} <span style="color:#5a7a99">(${pct}%)</span></div>
      <div style="width:60px;background:rgba(255,255,255,.05);border-radius:3px;height:6px;margin-left:.5rem">
        <div style="width:${pct}%;height:100%;background:${LOBBAUS_VARIT[i%LOBBAUS_VARIT.length]};border-radius:3px"></div>
      </div>
    </div>`;
  }).join("");
}

function piilotaLobbausNakyma() {
  document.getElementById("lobbausNakyma").style.display = "none";
  document.getElementById("btnLobbaus").classList.remove("active");
}

document.getElementById("btnLobbaus").addEventListener("click", () => {
  if (document.getElementById("lobbausNakyma").style.display !== "none") {
    piilotaLobbausNakyma();
  } else {
    naytaLobbausNakyma();
  }
});

lataaHakemisto();
</script>
