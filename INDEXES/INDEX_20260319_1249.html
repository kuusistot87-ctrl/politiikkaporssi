<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>POLITIIKKAPÖRSSI</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg-deep:     #03050f;
      --bg-panel:    #080d1f;
      --bg-card:     #0b1128;
      --border:      #1a2a55;
      --glow-cyan:   #00f5ff;
      --glow-pink:   #ff007a;
      --glow-green:  #39ff14;
      --text-primary:#e8f4ff;
      --text-muted:  #5a7a99;
      --accent:      #00d4ff;

      /* Puoluevärit */
      --kok:   #003580;
      --ps:    #ffd700;
      --sdp:   #cc0000;
      --kesk:  #007a3d;
      --vihr:  #39c639;
      --vas:   #c8001e;
      --rkp:   #ffd700;
      --kd:    #003c8f;
      --liik:  #6a0dad;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg-deep);
      color: var(--text-primary);
      font-family: 'Rajdhani', sans-serif;
      font-size: 16px;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Taustakuvio ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── HEADER ── */
    header {
      position: relative;
      text-align: center;
      padding: 3rem 1rem 2.5rem;
      border-bottom: 1px solid var(--border);
      overflow: hidden;
      z-index: 1;
    }

    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% -20%, rgba(0,212,255,.18), transparent 70%);
      pointer-events: none;
    }

    .header-eyebrow {
      font-family: 'Orbitron', monospace;
      font-size: .65rem;
      letter-spacing: .35em;
      color: var(--glow-cyan);
      text-transform: uppercase;
      margin-bottom: .75rem;
      opacity: .8;
    }

    h1 {
      font-family: 'Orbitron', monospace;
      font-size: clamp(2rem, 6vw, 4.5rem);
      font-weight: 900;
      letter-spacing: .12em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #fff 10%, var(--glow-cyan) 55%, var(--glow-pink) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 24px rgba(0,212,255,.4));
      line-height: 1.05;
    }

    .header-sub {
      margin-top: .9rem;
      font-size: .95rem;
      letter-spacing: .15em;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* Scanline dekoratiivinen viiva otsikossa */
    .scanline {
      display: block;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--glow-cyan), var(--glow-pink), transparent);
      margin: 1.4rem auto 0;
      width: 60%;
      opacity: .6;
      animation: pulse-line 3s ease-in-out infinite;
    }
    @keyframes pulse-line {
      0%,100% { opacity:.3; } 50% { opacity:.9; }
    }

    /* ── TOOLBAR ── */
    .toolbar {
      position: relative;
      z-index: 1;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: .75rem;
      padding: 1.25rem 2rem;
      border-bottom: 1px solid var(--border);
      background: rgba(8,13,31,.7);
      backdrop-filter: blur(6px);
    }

    .toolbar label {
      font-size: .8rem;
      letter-spacing: .12em;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    #searchInput {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-primary);
      font-family: 'Rajdhani', sans-serif;
      font-size: .95rem;
      padding: .5rem .9rem;
      width: 220px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    #searchInput:focus {
      border-color: var(--accent);
      box-shadow: 0 0 10px rgba(0,212,255,.25);
    }

    .filter-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-muted);
      font-family: 'Rajdhani', sans-serif;
      font-size: .8rem;
      letter-spacing: .1em;
      padding: .4rem .85rem;
      cursor: pointer;
      transition: all .2s;
      text-transform: uppercase;
    }
    .filter-btn:hover, .filter-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 8px rgba(0,212,255,.2);
    }

    .count-badge {
      margin-left: auto;
      font-size: .78rem;
      letter-spacing: .12em;
      color: var(--text-muted);
    }

    /* ── GRID ── */
    main {
      position: relative;
      z-index: 1;
      padding: 2rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1.25rem;
    }

    /* ── CARD ── */
    .card {
      position: relative;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0;
      cursor: pointer;
      overflow: hidden;
      transition: transform .25s, box-shadow .25s, border-color .25s;
      animation: fadeIn .4s ease both;
    }
    @keyframes fadeIn {
      from { opacity:0; transform: translateY(14px); }
      to   { opacity:1; transform: translateY(0); }
    }

    .card:hover {
      transform: translateY(-4px) scale(1.015);
      box-shadow: 0 8px 32px rgba(0,0,0,.6), 0 0 18px var(--party-glow, rgba(0,212,255,.25));
      border-color: var(--party-color, var(--accent));
    }

    /* Yläpalkki puoluevärillä */
    .card-topbar {
      height: 4px;
      background: var(--party-color, var(--accent));
      box-shadow: 0 0 12px var(--party-color, var(--accent));
    }

    .card-body { padding: 1.1rem 1.2rem 1.2rem; }

    .card-party-tag {
      display: inline-block;
      font-size: .65rem;
      letter-spacing: .18em;
      padding: .2rem .6rem;
      border-radius: 2px;
      background: rgba(255,255,255,.06);
      border: 1px solid var(--party-color, var(--border));
      color: var(--party-color, var(--text-muted));
      text-transform: uppercase;
      margin-bottom: .6rem;
    }

    .card-name {
      font-family: 'Orbitron', monospace;
      font-size: .88rem;
      font-weight: 700;
      letter-spacing: .05em;
      line-height: 1.3;
      color: var(--text-primary);
      margin-bottom: .45rem;
    }

    .card-meta {
      font-size: .78rem;
      color: var(--text-muted);
      letter-spacing: .05em;
    }

    .card-arrow {
      position: absolute;
      bottom: .9rem;
      right: 1rem;
      font-size: .7rem;
      letter-spacing: .1em;
      color: var(--party-color, var(--accent));
      opacity: 0;
      transition: opacity .2s, transform .2s;
    }
    .card:hover .card-arrow { opacity:1; transform: translateX(4px); }

    /* ── MODAL OVERLAY ── */
    #modalOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.78);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s;
    }
    #modalOverlay.open {
      opacity: 1;
      pointer-events: all;
    }

    /* ── MODAL BOX ── */
    #modalBox {
      position: relative;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      width: min(560px, 94vw);
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 0 60px rgba(0,0,0,.8), 0 0 30px rgba(0,212,255,.1);
      transform: translateY(20px) scale(.97);
      transition: transform .28s;
    }
    #modalOverlay.open #modalBox {
      transform: translateY(0) scale(1);
    }

    .modal-topbar {
      height: 3px;
      background: linear-gradient(90deg, var(--glow-cyan), var(--glow-pink));
    }

    #modalContent {
      padding: 2rem 2rem 2.5rem;
    }

    .modal-label {
      font-size: .7rem;
      letter-spacing: .22em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: .2rem;
    }
    .modal-party-tag {
      display: inline-block;
      font-size: .72rem;
      letter-spacing: .16em;
      padding: .25rem .7rem;
      border-radius: 3px;
      background: rgba(255,255,255,.05);
      border: 1px solid var(--modal-party-color, var(--border));
      color: var(--modal-party-color, var(--text-muted));
      text-transform: uppercase;
      margin-bottom: .9rem;
    }
    .modal-name {
      font-family: 'Orbitron', monospace;
      font-size: 1.5rem;
      font-weight: 700;
      line-height: 1.2;
      color: var(--text-primary);
      margin-bottom: 1.5rem;
      letter-spacing: .04em;
    }

    .modal-divider {
      height: 1px;
      background: linear-gradient(90deg, var(--modal-party-color, var(--accent)), transparent);
      margin: 1.25rem 0;
      opacity: .5;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem 1.5rem;
    }

    .detail-item {}
    .detail-item .d-label {
      font-size: .7rem;
      letter-spacing: .18em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: .2rem;
    }
    .detail-item .d-value {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: .04em;
    }

    .puheenvuorot-bar {
      margin-top: 1.5rem;
    }
    .puheenvuorot-bar .d-label {
      font-size: .7rem;
      letter-spacing: .18em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: .5rem;
    }
    .bar-track {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 4px;
      height: 10px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--modal-party-color, var(--accent)), var(--glow-cyan));
      box-shadow: 0 0 8px var(--modal-party-color, var(--accent));
      border-radius: 4px;
      transition: width .7s cubic-bezier(.4,0,.2,1);
      width: 0%;
    }
    .bar-count {
      font-family: 'Orbitron', monospace;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--modal-party-color, var(--accent));
      margin-top: .4rem;
    }

    /* Loading / error */
    .modal-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      padding: 2rem 0;
      color: var(--text-muted);
      font-size: .9rem;
      letter-spacing: .1em;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--glow-cyan);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Sulje-nappi */
    #closeBtn {
      position: absolute;
      top: .85rem;
      right: 1rem;
      background: none;
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text-muted);
      cursor: pointer;
      font-family: 'Orbitron', monospace;
      font-size: .65rem;
      letter-spacing: .15em;
      padding: .3rem .65rem;
      transition: all .2s;
    }
    #closeBtn:hover {
      border-color: var(--glow-pink);
      color: var(--glow-pink);
      box-shadow: 0 0 8px rgba(255,0,122,.3);
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      grid-column: 1/-1;
      text-align: center;
      padding: 5rem 1rem;
      color: var(--text-muted);
    }
    .empty-state span {
      font-family: 'Orbitron', monospace;
      font-size: 2rem;
      display: block;
      margin-bottom: .5rem;
      opacity: .3;
    }

    /* ── PUOLUE DROPDOWN ── */
    .puolue-dropdown-wrap {
      position: relative;
    }
    .puolue-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      background: #080d1f;
      border: 1px solid #1a2a55;
      border-radius: 6px;
      padding: .5rem;
      z-index: 200;
      min-width: 280px;
      display: none;
      flex-wrap: wrap;
      gap: .35rem;
      box-shadow: 0 8px 32px rgba(0,0,0,.6), 0 0 16px rgba(0,212,255,.08);
    }
    .puolue-dropdown.open {
      display: flex;
    }
    .puolue-dropdown .dp-btn {
      background: transparent;
      border: 1px solid #1a2a55;
      border-radius: 3px;
      color: #5a7a99;
      font-family: 'Rajdhani', sans-serif;
      font-size: .75rem;
      letter-spacing: .1em;
      padding: .3rem .6rem;
      cursor: pointer;
      transition: all .15s;
      text-transform: uppercase;
    }
    .puolue-dropdown .dp-btn:hover { border-color: #00d4ff; color: #00d4ff; }
    .puolue-dropdown .dp-btn.active { border-color: #00d4ff; color: #00d4ff; background: rgba(0,212,255,.08); }
    #btnNykyiset:hover, #btnNykyiset.active { background: rgba(62,198,62,.1) !important; border-color: #3ec63e !important; color: #3ec63e !important; }
    #btnHistorialliset:hover, #btnHistorialliset.active { background: rgba(245,166,35,.1) !important; border-color: #f5a623 !important; color: #f5a623 !important; }

    /* ── ACCORDION ── */
    .accordion-item {
      border: 1px solid var(--border);
      border-radius: 4px;
      margin-bottom: .5rem;
      overflow: hidden;
    }
    .accordion-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: .6rem 1rem;
      cursor: pointer;
      font-family: 'Orbitron', monospace;
      font-size: .65rem;
      letter-spacing: .18em;
      color: var(--text-muted);
      background: rgba(255,255,255,.02);
      transition: background .2s, color .2s;
      user-select: none;
    }
    .accordion-header:hover { background: rgba(0,212,255,.05); color: var(--accent); }
    .accordion-arrow { font-size: 1.1rem; line-height: 1; color: var(--accent); }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-deep); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    /* ── FOOTER ── */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 1.5rem;
      border-top: 1px solid var(--border);
      font-size: .72rem;
      letter-spacing: .12em;
      color: var(--text-muted);
    }
    footer strong { color: var(--accent); }

    @media (max-width: 600px) {
      main { padding: 1rem; gap: .85rem; }
      .detail-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-eyebrow">Suomen eduskunta · 2023–2027</div>
  <h1>Politiikkapörssi</h1>
  <div class="header-sub">KANSANEDUSTAJIEN TIETOKANTA // BETA v0.1</div>
  <span class="scanline"></span>
</header>

<!-- TOOLBAR -->
<div class="toolbar">
  <label for="searchInput">Haku:</label>
  <input id="searchInput" type="text" placeholder="Nimi tai puolue…" autocomplete="off"/>

  <button class="filter-btn active" data-puolue="" id="btnKaikki">Kaikki</button>

  <div class="puolue-dropdown-wrap">
    <button class="filter-btn" id="btnPuolue">Puolue ▾</button>
    <div class="puolue-dropdown" id="puolueDropdown"></div>
  </div>

  <button class="filter-btn" id="btnNykyiset" style="border-color:#3ec63e;color:#3ec63e">Nykyiset</button>
  <button class="filter-btn" id="btnHistorialliset" style="border-color:#f5a623;color:#f5a623">Historialliset</button>

  <span class="count-badge" id="countBadge"></span>
</div>

<!-- KORTTINÄKYMÄ -->
<main id="grid"></main>

<!-- MODAL -->
<div id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalName">
  <div id="modalBox">
    <div class="modal-topbar"></div>
    <button id="closeBtn" onclick="closeTTLProfile()" aria-label="Sulje">ESC ✕</button>
    <div id="modalContent">
      <!-- sisältö täytetään JS:llä -->
    </div>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <strong>POLITIIKKAPÖRSSI</strong> &mdash; Testidata. Ei virallinen lähde.
  Tiedot haetaan <code>data/poliitikot/[etunimi-sukunimi].json</code>
</footer>

<script>
const PUOLUEVARIT = {
  KOK:"#1a6fd8", PS:"#f5c400", SDP:"#e01010", KESK:"#009b50",
  VIHR:"#3ec63e", VAS:"#d00020", RKP:"#f5c400", KD:"#1040b0", LIIK:"#8a25cc",
};
const puolueVari = p => PUOLUEVARIT[p] || "#00d4ff";

let KAIKKI = [];
let aktiivisuusPuolue = "";
let aikasuodatin = "";

/* ── Lataa index.json ── */
async function lataaHakemisto() {
  const grid = document.getElementById("grid");
  grid.innerHTML = `<div class="empty-state">
    <div class="spinner" style="margin:0 auto 1rem"></div>
    <div style="font-size:.85rem;color:#5a7a99;letter-spacing:.1em">LADATAAN HAKEMISTOA…</div>
  </div>`;
  try {
    const res = await fetch("edustajat_json/index.json");
    if (!res.ok) throw new Error("HTTP " + res.status);
    KAIKKI = await res.json();
    rakennaPuoluePainikkeet();
    suodataJaRenderöi();
  } catch(e) {
    grid.innerHTML = `<div class="empty-state"><span>✗</span>
      <div style="color:#e01010;font-size:.85rem;">Hakemistoa ei löydy:<br>
      <code>edustajat_json/index.json</code><br><br>
      Aja: <code>python luo_hakemisto.py</code></div></div>`;
  }
}

/* ── Rakenna puolue-dropdown ── */
function rakennaPuoluePainikkeet() {
  const dropdown = document.getElementById("puolueDropdown");
  const puolueet = [...new Set(KAIKKI.map(m => m.puolue).filter(p => p && p !== "–"))].sort();
  dropdown.innerHTML = "";
  puolueet.forEach(p => {
    const btn = document.createElement("button");
    btn.className = "dp-btn";
    btn.textContent = p;
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const isActive = btn.classList.contains("active");
      dropdown.querySelectorAll(".dp-btn").forEach(b => b.classList.remove("active"));
      if (!isActive) {
        btn.classList.add("active");
        setPuolue(p, btn);
        document.getElementById("btnPuolue").textContent = p + " ▾";
        document.getElementById("btnPuolue").style.borderColor = "#00d4ff";
        document.getElementById("btnPuolue").style.color = "#00d4ff";
      } else {
        setPuolue("", null);
        document.getElementById("btnPuolue").textContent = "Puolue ▾";
        document.getElementById("btnPuolue").style.borderColor = "";
        document.getElementById("btnPuolue").style.color = "";
      }
      dropdown.classList.remove("open");
    });
    dropdown.appendChild(btn);
  });
}

// Dropdown toggle
document.getElementById("btnPuolue").addEventListener("click", (e) => {
  e.stopPropagation();
  document.getElementById("puolueDropdown").classList.toggle("open");
});

// Sulje dropdown kun klikataan muualle
document.addEventListener("click", () => {
  document.getElementById("puolueDropdown").classList.remove("open");
});

/* ── Suodatus ── */
function suodataJaRenderöi() {
  const q = document.getElementById("searchInput").value.toLowerCase().trim();
  const lista = KAIKKI.filter(m => {
    if (aikasuodatin === "nykyiset" && !m.nykyinen) return false;
    if (aikasuodatin === "hist"     &&  m.nykyinen) return false;
    if (aktiivisuusPuolue && m.puolue !== aktiivisuusPuolue) return false;
    if (!q) return true;
    return (
      (m.nimi       ||"").toLowerCase().includes(q) ||
      (m.puolue     ||"").toLowerCase().includes(q) ||
      (m.kotikunta  ||"").toLowerCase().includes(q) ||
      (m.vaalipiiri ||"").toLowerCase().includes(q) ||
      (m.koulutus   ||"").toLowerCase().includes(q) ||
      (m.syntymavuosi||"").includes(q)
    );
  });
  renderEdustajat(lista);
}

document.getElementById("searchInput").addEventListener("input", suodataJaRenderöi);

function setPuolue(p, btn) {
  aktiivisuusPuolue = p;
  // Kaikki-nappi aktiiviseksi jos ei puoluetta valittu
  document.getElementById("btnKaikki").classList.toggle("active", !p);
  suodataJaRenderöi();
}

function setAika(tila) {
  aikasuodatin = (aikasuodatin === tila) ? "" : tila;
  document.getElementById("btnNykyiset").classList.toggle("active", aikasuodatin === "nykyiset");
  document.getElementById("btnHistorialliset").classList.toggle("active", aikasuodatin === "hist");
  suodataJaRenderöi();
}

document.getElementById("btnNykyiset").addEventListener("click", () => setAika("nykyiset"));
document.getElementById("btnHistorialliset").addEventListener("click", () => setAika("hist"));
document.getElementById("btnKaikki").addEventListener("click", function() {
  aktiivisuusPuolue = "";
  this.classList.add("active");
  // Nollaa dropdown
  document.getElementById("puolueDropdown").querySelectorAll(".dp-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("btnPuolue").textContent = "Puolue ▾";
  document.getElementById("btnPuolue").style.borderColor = "";
  document.getElementById("btnPuolue").style.color = "";
  suodataJaRenderöi();
});

/* ── Renderöi kortit ── */
function renderEdustajat(lista) {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  if (!lista.length) {
    grid.innerHTML = `<div class="empty-state"><span>∅</span>Ei hakutuloksia</div>`;
    document.getElementById("countBadge").textContent = "";
    return;
  }
  const pohja = KAIKKI.filter(m =>
    aikasuodatin === "nykyiset" ? m.nykyinen : aikasuodatin === "hist" ? !m.nykyinen : true
  );
  document.getElementById("countBadge").textContent = `${lista.length} / ${pohja.length} edustajaa`;
  lista.forEach((m, i) => {
    const vari = puolueVari(m.puolue);
    const card = document.createElement("div");
    card.className = "card";
    card.style.setProperty("--party-color", vari);
    card.style.setProperty("--party-glow", vari + "55");
    card.style.animationDelay = `${Math.min(i,40)*35}ms`;
    card.setAttribute("role","button"); card.setAttribute("tabindex","0");
    const paikkatieto = m.nykyinen ? (m.vaalipiiri||m.kotikunta||"") : (m.kotikunta||"");
    const vuodet = m.kuolinvuosi ? `${m.syntymavuosi||"?"}–${m.kuolinvuosi}`
                 : m.syntymavuosi ? `s. ${m.syntymavuosi}` : "";
    card.innerHTML = `
      <div class="card-topbar"></div>
      <div class="card-body">
        <div class="card-party-tag">${m.puolue||"–"}</div>
        <div class="card-name">${m.nimi}</div>
        <div class="card-meta">${[paikkatieto,vuodet].filter(Boolean).join(" · ")}</div>
      </div>
      <div class="card-arrow">AVAA →</div>`;
    card.addEventListener("click", () => openTTLProfile(m));
    card.addEventListener("keydown", e => { if(e.key==="Enter"||e.key===" ") openTTLProfile(m); });
    grid.appendChild(card);
  });
}

/* ================================================================
   MODAL + EDUSKUNTA API
   ================================================================ */
const API = "https://avoindata.eduskunta.fi/api/v1/tables";

async function openTTLProfile(m) {
  const overlay = document.getElementById("modalOverlay");
  const vari    = puolueVari(m.puolue);
  overlay.style.setProperty("--modal-party-color", vari);
  document.documentElement.style.setProperty("--modal-party-color", vari);
  overlay.classList.add("open");
  document.body.style.overflow = "hidden";
  renderModalSkeleton(m, vari);


}

function haePersonId(m) {
  // Yritetään saada id eduskunta-linkistä: .../Sivut/1306.aspx
  if (m.eduskunta) {
    const match = m.eduskunta.match(/\/(\d+)\.aspx/);
    if (match) return match[1];
  }
  // Yritetään tiedostonimestä: ei suoraan saatavilla
  return null;
}



/* ── Skeleton: näytetään heti index.json:n tiedot ── */
function renderModalSkeleton(m, vari) {
  const content = document.getElementById("modalContent");
  const vuodet = m.kuolinvuosi
    ? `${m.syntymavuosi||"?"}–${m.kuolinvuosi}`
    : m.syntymavuosi ? `${m.syntymavuosi}–` : "–";
  const kuvaHtml = m.kuva
    ? `<img src="${m.kuva}" alt="${m.nimi}" onerror="this.style.display='none'"
         style="width:72px;height:88px;object-fit:cover;border-radius:3px;
                border:1px solid ${vari};float:right;margin:0 0 .5rem 1rem;">`
    : "";
  content.innerHTML = `
    <div class="modal-label">Kansanedustaja · ${m.puolue||"–"}</div>
    <div class="modal-party-tag" style="--modal-party-color:${vari}">${m.puolue||"–"}</div>
    ${kuvaHtml}
    <div class="modal-name" id="modalName">${m.nimi}</div>
    <div class="modal-divider"></div>
    <div id="accordion-container">
      ${accordionItem("perustiedot","PERUSTIEDOT",`
        <div class="detail-grid">
          <div class="detail-item"><div class="d-label">Kotikunta</div><div class="d-value">${m.kotikunta||"–"}</div></div>
          <div class="detail-item"><div class="d-label">Vaalipiiri</div><div class="d-value">${m.vaalipiiri||"–"}</div></div>
          <div class="detail-item"><div class="d-label">Syntymävuosi</div><div class="d-value">${vuodet}</div></div>
          <div class="detail-item"><div class="d-label">Vaalikaudet</div><div class="d-value">${m.vaalikaudet||"–"}</div></div>
          <div class="detail-item"><div class="d-label">Koulutus</div><div class="d-value">${m.koulutus||"–"}</div></div>
          <div class="detail-item"><div class="d-label">Status</div><div class="d-value" style="color:${m.nykyinen?"#3ec63e":"#f5a623"}">${m.nykyinen?"● aktiivinen":"● päättynyt"}</div></div>
        </div>`, true)}
      ${accordionItem("linkit","LINKIT & YHTEYSTIEDOT",`
        <div id="linkit-content" style="display:flex;flex-direction:column;gap:.5rem">
          <div class="spinner" style="margin:.5rem auto"></div>
        </div>`)}
      ${accordionItem("toiminta","ALOITTEET & PUHEENVUOROT",`
        <div id="toiminta-content">
          <div class="spinner" style="margin:.5rem auto"></div>
        </div>`)}
      ${accordionItem("sidonnaisuudet","SIDONNAISUUDET",`
        <div id="sidonnaisuudet-content">
          <div class="spinner" style="margin:.5rem auto"></div>
        </div>`)}
    </div>
    <div style="display:flex;gap:.5rem;flex-wrap:wrap;margin-top:1.25rem;">
      ${m.eduskunta ? lnk(m.eduskunta,"EDUSKUNTA.FI ↗",vari) : ""}
      ${m.wiki      ? lnk(m.wiki,"WIKIPEDIA ↗","#aaa") : ""}
      ${m.twitter   ? lnk("https://twitter.com/"+m.twitter,"TWITTER ↗","#1d9bf0") : ""}
    </div>`;

  // Accordion-logiikka
  content.querySelectorAll(".accordion-header").forEach(h => {
    h.addEventListener("click", () => {
      const body = h.nextElementSibling;
      const isOpen = body.style.maxHeight && body.style.maxHeight !== "0px";
      body.style.maxHeight = isOpen ? "0px" : body.scrollHeight + "px";
      h.querySelector(".accordion-arrow").style.transform = isOpen ? "rotate(0deg)" : "rotate(90deg)";
    });
  });
}

function accordionItem(id, label, content, open=false) {
  return `
    <div class="accordion-item">
      <div class="accordion-header">
        <span>${label}</span>
        <span class="accordion-arrow" style="transition:transform .2s;display:inline-block;transform:${open?"rotate(90deg)":"rotate(0deg)"}">›</span>
      </div>
      <div class="accordion-body" style="max-height:${open?"500px":"0px"};overflow:hidden;transition:max-height .3s ease">
        <div style="padding:.75rem 0">${content}</div>
      </div>
    </div>`;
}

function lnk(url, teksti, vari) {
  return `<a href="${url}" target="_blank" rel="noopener"
    style="color:${vari};font-size:.75rem;letter-spacing:.1em;text-decoration:none;
           border:1px solid ${vari}55;padding:.25rem .6rem;border-radius:3px;
           display:inline-block">${teksti}</a>`;
}

/* ── Modal sulje ── */
function closeTTLProfile() {
  document.getElementById("modalOverlay").classList.remove("open");
  document.body.style.overflow = "";
}
document.addEventListener("keydown", e => { if(e.key==="Escape") closeTTLProfile(); });
document.getElementById("modalOverlay").addEventListener("click", e => {
  if(e.target===document.getElementById("modalOverlay")) closeTTLProfile();
});

lataaHakemisto();
</script>
