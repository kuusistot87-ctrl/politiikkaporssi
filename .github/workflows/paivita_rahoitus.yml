name: Päivitä puoluerahoitusdata

on:
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Asenna Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Asenna riippuvuudet
        run: pip install requests beautifulsoup4 lxml

      - name: Aja scraper
        run: python .github/scripts/hae_puoluerahoitus.py

      - name: Commitoi ja pushaa jos muutoksia
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rahoitus_json/puoluerahoitus.json
          git diff --cached --quiet || (git commit -m "Auto: päivitä puoluerahoitusdata $(date +'%d.%m.%Y')" && git push)
