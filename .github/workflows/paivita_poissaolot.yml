name: Päivitä poissaolotilastot
on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  paivita:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Asenna riippuvuudet
        run: |
          pip install playwright
          python -m playwright install chromium --with-deps
      - name: Hae poissaolotilastot
        run: python .github/scripts/paivita_poissaolot.py
      - name: Committaa muutokset
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Poissaolotilastot/poissaolot.json
          git diff --staged --quiet || git commit -m "Auto: poissaolotilastot $(date +'%d.%m.%Y')"
          git push
