name: Päivitä äänestysdata

on:
  schedule:
    - cron: '0 2 * * *'   # Joka yö klo 02:00 UTC (04:00 Helsinki)
  workflow_dispatch:        # Myös manuaalisesti käynnistettävissä

jobs:
  paivita:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # Koko historia — tarvitaan rebase-varten
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Asenna riippuvuudet
        run: pip install requests

      - name: Hae äänestysdata
        run: python skriptit/hae_aanestykset.py

      - name: Commitoi ja push (rebase-strategia)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Pull ensin rebase-strategialla — välttää konfliktit
          git pull --rebase --autostash origin main

          # Lisää vain JSON-tiedostot — ei kosketa index.html:ään
          git add aanestykset_json/

          # Commitoi vain jos muutoksia
          if git diff --staged --quiet; then
            echo "Ei muutoksia äänestysdata — skipataan commit"
          else
            git commit -m "Auto: päivitä äänestysdata $(date +'%d.%m.%Y %H:%M')"
            # Push retry-loopilla jos samanaikainen push törmää
            for i in 1 2 3; do
              git push && break
              echo "Push epäonnistui, yritetään uudelleen ($i/3)..."
              git pull --rebase origin main
              sleep 5
            done
          fi
