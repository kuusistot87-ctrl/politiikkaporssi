name: Päivitä äänestysdata

on:
  schedule:
    - cron: '0 2 * * *'   # Joka yö klo 02:00 UTC (04:00 Helsinki)
  workflow_dispatch:        # Myös manuaalisesti käynnistettävissä

jobs:
  paivita:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Asenna riippuvuudet
        run: pip install requests

      - name: Hae äänestysdata
        run: python .github/scripts/hae_aanestykset.py

      - name: Commitoi ja push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          git add aanestykset_json/
          if git diff --staged --quiet; then
            echo "Ei muutoksia — skipataan commit"
          else
            git commit -m "Auto: päivitä äänestysdata $(date +'%d.%m.%Y %H:%M')"
            for i in 1 2 3; do
              git push && break
              git pull --rebase origin main
              sleep 5
            done
          fi
